spring.application.name=PortfolioBackend
server.port=${PORT:4000}

# Disable database and Redis autoconfigurations as data is JSON-file backed
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

spring.session.store-type=none
spring.docker.compose.enabled=false

# BYO Shell Rust server URL and API Key (read from environment variables)
byoshell.api.url=${BYOSHELL_API_URL}
byoshell.api.key=${BYOSHELL_API_KEY}

